# Gradle build tuning ─────────────────────────────────────────────────────────
# Give the Gradle daemon a comfortable heap; big native builds appreciate it.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Build modules in parallel and cache task outputs — faster incremental builds.
org.gradle.parallel=true
org.gradle.caching=true

# AndroidX is the modern support-library namespace; required by our deps.
android.useAndroidX=true

# Kotlin compiles to JVM-style code by default; nothing exotic needed here.
kotlin.code.style=official
